<!DOCTYPE html>
<html>
<head>
    <title>College Timetable & Exam Timetable Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:'Segoe UI',Arial,sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:1100px;
            background:rgba(255,255,255,0.96);
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 25px 60px rgba(0,0,0,0.35);
            backdrop-filter:blur(10px);
        }

        h1{
            margin:0;
            padding:22px;
            background:linear-gradient(90deg,#1565c0,#42a5f5);
            color:white;
            text-align:center;
            font-size:32px;
            letter-spacing:1px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:15px;
            padding:18px 20px;
            background:#eef5ff;
            border-bottom:1px solid #dbeafe;
            flex-wrap:wrap;
        }

        .top-bar label{
            font-weight:700;
            color:#1e3a8a;
        }

        #branchSelect{
            padding:12px 14px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            background:white;
            font-size:15px;
            min-width:140px;
            outline:none;
        }

        .quick-buttons{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .quick-buttons button,
        .marks-btn,
        .input-area button{
            border:none;
            border-radius:12px;
            padding:12px 18px;
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
        }

        .quick-buttons button{
            background:#dbeafe;
            color:#1d4ed8;
        }

        .quick-buttons button:hover{
            background:#bfdbfe;
            transform:translateY(-2px);
        }

        .marks-btn{
            background:linear-gradient(90deg,#f59e0b,#f97316);
            color:white;
        }

        .marks-btn:hover,
        .input-area button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(0,0,0,0.15);
        }

        #chatBox{
            height:560px;
            overflow-y:auto;
            padding:24px;
            background:linear-gradient(to bottom,#f8fbff,#eef6ff);
        }

        #chatBox::-webkit-scrollbar{
            width:8px;
        }

        #chatBox::-webkit-scrollbar-thumb{
            background:#93c5fd;
            border-radius:10px;
        }

        .message{
            padding:16px 18px;
            margin-bottom:18px;
            border-radius:18px;
            max-width:88%;
            line-height:1.7;
            animation:fadeIn 0.25s ease;
            box-shadow:0 6px 16px rgba(0,0,0,0.08);
        }

        .user{
            background:linear-gradient(135deg,#4ade80,#22c55e);
            color:white;
            margin-left:auto;
            border-bottom-right-radius:4px;
        }

        .bot{
            background:white;
            border:1px solid #dbeafe;
            color:#1e293b;
            border-bottom-left-radius:4px;
        }

        .bot h3{
            margin-top:0;
            color:#1d4ed8;
        }

        .input-area{
            display:flex;
            gap:12px;
            padding:18px;
            background:white;
            border-top:1px solid #e5e7eb;
        }

        #userInput{
            flex:1;
            padding:16px;
            border:1px solid #cbd5e1;
            border-radius:14px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        #userInput:focus{
            border-color:#3b82f6;
            box-shadow:0 0 0 4px rgba(59,130,246,0.15);
        }

        .input-area button{
            background:linear-gradient(90deg,#2563eb,#1d4ed8);
            color:white;
            min-width:110px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:12px;
            font-size:13px;
            overflow:hidden;
            border-radius:14px;
        }

        th,td{
            border:1px solid #d1d5db;
            padding:10px;
            text-align:center;
        }

        th{
            background:linear-gradient(90deg,#2563eb,#3b82f6);
            color:white;
            position:sticky;
            top:0;
        }

        tr:nth-child(even){
            background:#f8fafc;
        }

        a{
            color:#2563eb;
            font-weight:600;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(8px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){
            body{
                padding:0;
                background:#0f172a;
            }

            .container{
                width:100%;
                height:100vh;
                max-width:none;
                border-radius:0;
                margin:0;
                display:flex;
                flex-direction:column;
            }

            h1{
                font-size:22px;
                padding:16px;
            }

            .top-bar{
                flex-direction:column;
                align-items:stretch;
                padding:12px;
                gap:12px;
            }

            .top-bar > div,
            .marks-btn{
                width:100%;
            }

            #branchSelect{
                width:100%;
                margin-top:8px;
                min-width:auto;
            }

            .quick-buttons{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:8px;
                width:100%;
            }

            .quick-buttons button{
                width:100%;
                padding:12px 8px;
                font-size:13px;
            }

            .marks-btn{
                width:100%;
                font-size:14px;
                padding:14px;
            }

            #chatBox{
                flex:1;
                height:auto;
                padding:14px;
            }

            .message{
                max-width:100%;
                font-size:14px;
                padding:14px;
                margin-bottom:12px;
            }

            table{
                display:block;
                width:100%;
                overflow-x:auto;
                white-space:nowrap;
                font-size:12px;
                border-radius:10px;
            }

            th,td{
                padding:8px 6px;
                min-width:110px;
            }

            .input-area{
                padding:10px;
                gap:8px;
                background:#fff;
                border-top:1px solid #ddd;
                position:sticky;
                bottom:0;
            }

            #userInput{
                font-size:15px;
                padding:14px;
            }

            .input-area button{
                width:100%;
                padding:14px;
                font-size:15px;
            }
        }

            .quick-buttons{
                width:100%;
            }

            .quick-buttons button,
            .marks-btn{
                width:100%;
            }

            .input-area{
                flex-direction:column;
            }

            .input-area button{
                width:100%;
            }

            table{
                display:block;
                overflow-x:auto;
                white-space:nowrap;
            }

            .message{
                max-width:100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="padding:15px;background:#fff8e1;text-align:center;border-bottom:1px solid #ddd;">
        <button onclick="window.open('https://internalmarks7cal-netizen.github.io/InternalMarksCal/', '_blank')" style="background:#ff9800;">
            Open Internal Marks Calculator
        </button>
    </div>
    <div class="container">
    <h1>🎓 College Timetable & Exam Bot</h1>

    <div class="top-bar">
        <div>
            <label>Select Branch:</label>
            <select id="branchSelect">
                <option value="CB">CB</option>
                <option value="CE">CE</option>
                <option value="CM">CM</option>
                <option value="CSE">CSE</option>
                <option value="DS">DS</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
                <option value="IT">IT</option>
                <option value="ME">ME</option>
            </select>
        </div>

        <div class="quick-buttons">
            <button onclick="document.getElementById('userInput').value='show mid timetable';sendMessage();">Mid Timetable</button>
            <button onclick="document.getElementById('userInput').value='show sem timetable';sendMessage();">Sem Timetable</button>
            <button onclick="document.getElementById('userInput').value='dbms exam date';sendMessage();">DBMS Date</button>
        </div>

        <button class="marks-btn" onclick="window.open('https://internalmarks7cal-netizen.github.io/InternalMarksCal/','_blank')">
            Internal Marks Calculator
        </button>
    </div>

    <div id="chatBox">
        <div class="message bot">
            <h3>Welcome 👋</h3>
            Ask me things like:<br><br>
            • show mid timetable<br>
            • show sem timetable<br>
            • dbms exam date<br>
            • operating systems exam date<br>
            • internal marks calculator
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your timetable question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = text;
    document.getElementById("chatBox").appendChild(div);
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
}

function sendMessage(){
    const branch = document.getElementById("branchSelect").value;
    let input = document.getElementById("userInput").value.toLowerCase().trim();

    if(input === "") return;

    addMessage(input, "user");

    let reply = "Sorry, I could not understand. Try asking: show mid timetable or show sem timetable";

    if(input.includes("show mid timetable") || input.includes("mid exam") || input.includes("mid timetable")){
        reply = "<h3>Selected Branch: " + branch + "</h3>" + midTimetableHTML;
    }
    else if(input.includes("show sem timetable") || input.includes("semester exam") || input.includes("sem exam") || input.includes("semester timetable")){
        reply = "<h3>Selected Branch: " + branch + "</h3>" + semTimetableHTML;
    }
    else if(input.includes("show exam timetable") || input.includes("time table") || input.includes("timetable")){
        reply = "<b>Select one:</b><br><br>• show mid timetable<br>• show sem timetable";
    }
    else if(input.includes("dbms")){
        reply = "Database Management Systems exam is on 17/04/2026 (Friday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("web") || input.includes("front end")){
        reply = "Web Technologies / Front End Web Technologies exam is on 16/04/2026 (Thursday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("operating systems") || input.includes("os")){
        reply = "Operating Systems exam is on 15/04/2026 (Wednesday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("daa") || input.includes("algorithm")){
        reply = "Design & Analysis of Algorithms exam is on 18/04/2026 (Saturday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("environmental science")){
        reply = "Environmental Science exam is on 09/04/2026 (Thursday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("constitution of india")){
        reply = "Constitution of India exam is on 09/04/2026 (Thursday) from 11:00 AM to 12:30 PM.";
    }
    else if(input.includes("internal marks") || input.includes("marks calculator") || input.includes("internal calculator")){
        reply = `You can use the Internal Marks Calculator here:<br><br><a href="https://internalmarks7cal-netizen.github.io/InternalMarksCal/" target="_blank">https://internalmarks7cal-netizen.github.io/InternalMarksCal/</a>`;
    }

    setTimeout(() => {
        addMessage(reply, "bot");
    }, 300);

    document.getElementById("userInput").value = "";
}

document.getElementById("userInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>
